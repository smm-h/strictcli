# DO NOT EDIT -- generated by rlsbl monorepo sync
name: CI Router
on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.sha }}
  cancel-in-progress: true
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      strictcli: ${{ steps.changes.outputs.strictcli }}
      go-strictcli: ${{ steps.changes.outputs.go-strictcli }}
      ts-strictcli: ${{ steps.changes.outputs.ts-strictcli }}
      conformance: ${{ steps.changes.outputs.conformance }}
    steps:
    - uses: actions/checkout@v6
    - uses: dorny/paths-filter@v4
      id: changes
      with:
        filters: |
          strictcli:
            - 'python/**'
            - 'python/**'
            - 'LICENSE'
          go-strictcli: 'go/**'
          ts-strictcli: 'typescript/**'
          conformance:
            - 'conformance/**'
            - 'python/**'
            - 'go/**'
            - 'typescript/**'
  strictcli-ci-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # requires-python: >= 3.11
        python-version: ['3.12', '3.13', '3.14']
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
    - run: uv python install ${{ matrix.python-version }}
    - run: uv sync --locked
    - run: uv run python -c "import strictcli"
    - name: Install gitleaks
      run: |
        GITLEAKS_VERSION=8.24.3
        curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks
    - run: uv run pytest --rootdir .
    defaults:
      run:
        working-directory: python
    name: strictcli-ci / test
    needs:
    - detect
    if: needs.detect.outputs.strictcli == 'true'
  go-strictcli-ci-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      # go.mod: go 1.25.7
    - uses: actions/setup-go@v6
      with:
        go-version-file: go/go.mod
    - run: go vet ./...
    - run: go test ./... -race -short -timeout=10m
    defaults:
      run:
        working-directory: go
    name: go-strictcli-ci / test
    needs:
    - detect
    if: needs.detect.outputs.go-strictcli == 'true'
  ts-strictcli-ci-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # engines.node: >= 22
        node-version: [22, 24]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - run: npm ci
    - run: npm run build
    - run: npm run lint
    - run: npm test
    - run: npm audit --audit-level=moderate || true
    defaults:
      run:
        working-directory: typescript
    name: ts-strictcli-ci / test
    needs:
    - detect
    if: needs.detect.outputs.ts-strictcli == 'true'
  conformance-ci-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
    - run: uv python install 3.13
    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: go/go.sum
    - uses: actions/setup-node@v6
      with:
        node-version: 22
    - name: Build TypeScript implementation
      working-directory: typescript
      run: |
        npm ci
        npm run build
    - name: Install strictcli and conformance tool
      working-directory: .
      run: |
        pip install -e ./python --break-system-packages
        pip install -e ./conformance --break-system-packages
    - name: Conformance checks
      run: conformance check --tag pre-release
    defaults:
      run:
        working-directory: conformance
    name: conformance-ci / test
    needs:
    - detect
    if: needs.detect.outputs.conformance == 'true'
