# DO NOT EDIT -- generated by rlsbl monorepo sync
name: CI Router
on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.sha }}
  cancel-in-progress: true
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      strictcli: ${{ steps.changes.outputs.strictcli }}
      go-strictcli: ${{ steps.changes.outputs.go-strictcli }}
      conformance: ${{ steps.changes.outputs.conformance }}
    steps:
    - uses: actions/checkout@v6
    - uses: dorny/paths-filter@v4
      id: changes
      with:
        filters: |
          strictcli: 'python/**'
          go-strictcli: 'go/**'
          conformance:
            - 'conformance/**'
            - 'python/**'
            - 'go/**'
  strictcli-ci:
    needs: detect
    if: needs.detect.outputs.strictcli == 'true'
    uses: ./.github/workflows/strictcli-ci.yml
  strictcli-ci-pypi:
    needs: detect
    if: needs.detect.outputs.strictcli == 'true'
    uses: ./.github/workflows/strictcli-ci-pypi.yml
  go-strictcli:
    needs: detect
    if: needs.detect.outputs.go-strictcli == 'true'
    uses: ./.github/workflows/go-strictcli-ci.yml
  conformance:
    needs: detect
    if: needs.detect.outputs.conformance == 'true'
    uses: ./.github/workflows/conformance-ci.yml
