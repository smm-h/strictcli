# DO NOT EDIT -- generated by rlsbl monorepo sync
name: Publish Router
on:
  release:
    types:
    - published
  workflow_dispatch:
jobs:
  no-op:
    runs-on: ubuntu-latest
    if: 'true'
    permissions: {}
    steps:
    - run: echo 'No publish target for this release tag'
  strictcli-pypi:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
    - run: uv build
    - uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: python/dist/
    permissions:
      contents: read
      id-token: write
    if: startsWith(github.event.release.tag_name, 'strictcli@v')
    defaults:
      run:
        working-directory: python
  strictcli-npm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24
        registry-url: https://registry.npmjs.org
    - run: npm publish --provenance --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    permissions:
      contents: read
      id-token: write
    if: startsWith(github.event.release.tag_name, 'strictcli@v')
    defaults:
      run:
        working-directory: python
