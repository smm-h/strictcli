description = "Command declaration framework: structured handler returns, programmatic invocation, typed args, config fields, compound types, tool export, and MCP projection."
# Optional context explaining why these changes were made
context = """
This release transforms strictcli from a CLI framework into a command declaration framework with multiple output projections. Commands declared once can be invoked via CLI (existing), programmatic API (App.Call), tool export (AsTools with JSON Schema), and MCP server (--mcp flag).

Key additions: DataCommand/HandlerResult for structured returns, typed positional args with choices, first-class ConfigField declarations with per-command binding and startup validation, compound types (ListOf/DictOf), command visibility (Hidden/Interactive), and schema enrichment with versioning and constraint serialization.
"""
