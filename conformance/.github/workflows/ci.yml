name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.13
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
      - run: uv sync
        working-directory: python
      - name: API surface check
        run: uv run python ../conformance/check_api_surface.py
        working-directory: python
      - name: Error parity check
        run: uv run python ../conformance/check_error_parity.py
        working-directory: python
      - run: uv run python ../conformance/run.py --target python
        working-directory: python
      - run: uv run python ../conformance/run.py --target go
        working-directory: python
