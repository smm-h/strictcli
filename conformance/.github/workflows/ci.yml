name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.13
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: go/go.sum
      - name: Install strictcli and conformance tool
        working-directory: .
        run: |
          pip install -e ./python --break-system-packages
          pip install -e ./conformance --break-system-packages
      - name: Conformance checks
        run: conformance check --tag pre-release
