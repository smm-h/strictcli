[[releasables]]
name = "py-strictcli"

[[releasables]]
name = "go-strictcli"

[[releasables]]
name = "ts-strictcli"

[[projects]]
path = "python/"
name = "strictcli"
releasable = "py-strictcli"
watch = ["python/**", "LICENSE"]

[[projects]]
path = "go/"
name = "go-strictcli"
releasable = "go-strictcli"

[[projects]]
path = "typescript/"
name = "ts-strictcli"
releasable = "ts-strictcli"

[[projects]]
path = "conformance/"
name = "conformance"
watch = ["python/**", "go/**", "typescript/**"]
dev_node = true
releasable = false
