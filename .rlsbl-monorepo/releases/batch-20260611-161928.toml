[packages.strictcli]
bump = "minor"
description = "Public API for running checks programmatically"
context = "Adds App.run_checks(), format_check_results(), format_check_results_json(), and CheckRunResult — a stable public API replacing the private _filter_checks/_resolve_check_order/_run_checks/_check_format_human functions that consumers like rlsbl were forced to use."
include = ["pypi", "npm"]
exclude = []

[packages.go-strictcli]
bump = "minor"
description = "Public API for running checks programmatically, skip behavior fix"
context = "Adds App.RunChecks(), FormatCheckResults(), FormatCheckResultsJSON(), CheckRunResult, and RunChecksOptions. Also fixes a bug where explicit skip from a check implementation incorrectly set exit code to 1 and cascaded to dependents."
include = ["go"]
exclude = []

[packages.conformance]
bump = "minor"
description = "New conformance cases for check runner public API and skip behavior"
context = "Added cases for explicit skip behavior, mixed pass/fail/warn with --ignore-warnings, multi-level dependency chain failure, tag+glob intersection filtering, and verbose output with pass details. Updated API surface and error parity checkers for new public API."
include = ["plain"]
exclude = []
