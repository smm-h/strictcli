[releasables.py-strictcli]
# Version bump type: patch, minor, major, hotfix, or prerelease
bump = "minor"
# Short description of this release (required)
description = "Deterministic cli-test-coverage verdict from the committed manifest; chdir-safe coverage recording"
# Optional context explaining why these changes were made
context = "The cli-test-coverage check previously derived its verdict solely from local per-process shard files, so any machine that had not run the suite failed with 'no coverage data' regardless of repo state. The check now derives its verdict from the committed .strictcli/test-coverage.json manifest (union with any local shards), making it deterministic across machines. Coverage recording and the check are also anchored to the app's construction-time directory, so tests that chdir still record into the repo and a check evaluated from a foreign cwd reads the app's own state."
# Pre-release identifier: alpha, beta, rc, or stable
# preid = ""
include = ["pypi"]
exclude = []

