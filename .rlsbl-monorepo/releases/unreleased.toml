[packages.go-strictcli]
bump = "minor"
description = "Unexported Command fields, command tags, tag contracts"
context = "Breaking: Command collection fields (Flags, Args, FlagSets, Mutex, Dependencies) are now unexported. New: command tags via WithTags(), group inheritance via variadic tags on App.Group()/Group.Group(), and tag contracts via App.TagContract()."
include = ["go"]
exclude = []

[packages.conformance]
