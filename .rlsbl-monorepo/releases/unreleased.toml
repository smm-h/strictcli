[releasables.strictcli]
bump = "minor"
description = "Registration-time ban on bare --force flag name and --no-* prefix"
context = "Flag names 'force' (exact) and names starting with 'no-' are now rejected at registration time. Bare --force encourages agents to bypass guardrails without thinking; qualified names like --force-overwrite make the intent explicit. The no- prefix is reserved for strictcli's auto-generated negation system (--no-flag for negatable bools)."
include = ["pypi", "npm"]
exclude = []

[releasables.go-strictcli]
bump = "minor"
description = "Registration-time ban on bare --force flag name and --no-* prefix"
context = "Flag names 'force' (exact) and names starting with 'no-' are now rejected at registration time. Bare --force encourages agents to bypass guardrails without thinking; qualified names like --force-overwrite make the intent explicit. The no- prefix is reserved for strictcli's auto-generated negation system (--no-flag for negatable bools)."
include = ["go"]
exclude = []
