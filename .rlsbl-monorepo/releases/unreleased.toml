[releasables.strictcli]
# Version bump type: patch, minor, major, hotfix, or prerelease
bump = "patch"
# Short description of this release (required)
description = "Recovered full release history and added MIT license"
# Optional context explaining why these changes were made
context = "53 pre-releasable versioned changelog files were recovered from saferm archive, restoring complete release history in CHANGELOG.md. Project now includes MIT license."
# Pre-release identifier: alpha, beta, rc, or stable
# preid = ""
include = ["pypi", "npm"]
exclude = []

[releasables.go-strictcli]
# Version bump type: patch, minor, major, hotfix, or prerelease
bump = "hotfix"
# Short description of this release (required)
description = "Recovered full release history"
# Optional context explaining why these changes were made
context = "53 pre-releasable versioned changelog files were recovered from saferm archive, restoring complete release history in CHANGELOG.md. All changes in this release are infrastructure-only (scaffold updates, docstrings, changelog recovery)."
# Pre-release identifier: alpha, beta, rc, or stable
# preid = ""
include = ["go"]
exclude = []
