[releasables.go-strictcli]
# Version bump type: patch, minor, major, hotfix, or prerelease
bump = "patch"
# Short description of this release (required)
description = "Dict flag parse-error message now matches the sibling implementations"
# Optional context explaining why these changes were made
context = "The dict flag missing-equals error now reads `--flag: expected key=value or JSON`, matching the Python and TypeScript implementations (Go has always accepted JSON object input for dict flags; the message understated it). Also, `config show --plain` now displays config-sourced values coerced to the flag's declared type, matching runtime resolution and the sibling implementations."
# Pre-release identifier: alpha, beta, rc, or stable
# preid = ""
include = ["go"]
exclude = []

[releasables.ts-strictcli]
# Version bump type: patch, minor, major, hotfix, or prerelease
bump = ""
# Short description of this release (required)
description = "Native TypeScript implementation"
# Optional context explaining why these changes were made
context = "Versions <=0.30.1 were an npm wrapper that installed the Python package via pip. From 0.31.0, strictcli on npm is a native TypeScript implementation. Python users: install strictcli from PyPI instead. This version begins the TypeScript era of the strictcli npm package."
# Pre-release identifier: alpha, beta, rc, or stable
# preid = ""
include = ["npm"]
exclude = []
