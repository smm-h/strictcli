[releasables.ts-strictcli]
# Version bump type: patch, minor, major, hotfix, or prerelease
# First release: no ts-strictcli tag exists, so the bump type is ignored and 0.31.0 publishes as-is
bump = "minor"
# Short description of this release (required)
description = "Native TypeScript implementation"
# Optional context explaining why these changes were made
context = "Versions <=0.30.1 were an npm wrapper that installed the Python package via pip. From 0.31.0, strictcli on npm is a native TypeScript implementation. Python users: install strictcli from PyPI instead."
# Pre-release identifier: alpha, beta, rc, or stable
# preid = ""
include = ["npm"]
exclude = []
