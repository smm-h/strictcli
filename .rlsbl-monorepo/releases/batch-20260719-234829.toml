[releasables.py-strictcli]
# Version bump type: patch, minor, major, hotfix, or prerelease
bump = "patch"
# Short description of this release (required)
description = "cli-test-coverage skips instead of failing when run outside the app's own dev tree"
# Optional context explaining why these changes were made
context = "An installed app that runs its checks from a foreign project's directory anchored cli-test-coverage to that foreign cwd, which has no coverage manifest or shard files, so the check failed listing the app's entire command surface as uncovered. The check now applies subject-matter gating: when the anchored coverage root contains neither a manifest nor any shard files, it reports a visible skip naming the anchored path. When either exists, behavior is unchanged."
# Pre-release identifier: alpha, beta, rc, or stable
# preid = ""
include = ["pypi"]
exclude = []

